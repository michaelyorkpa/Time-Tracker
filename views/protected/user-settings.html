<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Settings | Longtail Forge</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/longtail-forge.css?v=5">
  </head>
  <body data-page-title="User Settings">
    <main class="settings-page">
      <h1>User Settings</h1>

      <form class="settings-form" data-user-theme-form>
        <fieldset class="settings-fieldset">
          <legend>Appearance</legend>

          <div class="theme-mode-control" role="radiogroup" aria-label="Color mode">
            <label>
              <input type="radio" name="themeMode" value="light" data-theme-mode-option checked>
              <span>Light</span>
            </label>
            <label>
              <input type="radio" name="themeMode" value="dark" data-theme-mode-option>
              <span>Dark</span>
            </label>
            <label>
              <input type="radio" name="themeMode" value="auto" data-theme-mode-option>
              <span>Auto</span>
            </label>
          </div>
        </fieldset>
      </form>

      <form class="settings-form" data-user-password-form>
        <fieldset class="settings-fieldset">
          <legend>Password</legend>

          <label>
            Current Password
            <input type="password" autocomplete="current-password" data-current-password required>
          </label>

          <label>
            New Password
            <input type="password" autocomplete="new-password" data-new-password required minlength="8">
          </label>

          <label>
            Confirm New Password
            <input type="password" autocomplete="new-password" data-confirm-password required minlength="8">
          </label>
        </fieldset>

        <button type="submit" data-save-password>Change Password</button>
      </form>

      <p data-user-settings-status role="status" aria-live="polite"></p>
    </main>

    <script src="js/navigation.js"></script>
    <script src="js/user-settings.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
