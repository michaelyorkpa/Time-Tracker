<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Entries | Longtail Forge</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/longtail-forge.css?v=5">
  </head>
  <body data-page-title="Edit Entries">
    <main class="entry-page edit-entries-page">
      <h1>Edit Entries</h1>

      <section class="entry-filters" aria-label="Entry filters">
        <label>
          Entry Status
          <select data-edit-filter-status>
            <option value="">All statuses</option>
            <option value="unbilled">Unbilled</option>
            <option value="billed">Billed</option>
            <option value="paid">Paid</option>
          </select>
        </label>

        <label class="report-period-control">
          Dates
          <select data-edit-filter-period>
            <option value="current">Current billing period</option>
            <option value="last">Last billing period</option>
            <option value="custom">Custom</option>
            <option value="all">All dates</option>
          </select>
        </label>

        <div class="report-custom-dates" data-edit-filter-custom-dates hidden>
          <label>
            Start Date
            <input type="date" data-edit-filter-start-date disabled>
          </label>

          <label>
            End Date
            <input type="date" data-edit-filter-end-date disabled>
          </label>
        </div>

        <label>
          Client
          <select data-edit-filter-client>
            <option value="">All clients</option>
          </select>
        </label>

        <label>
          Project
          <select data-edit-filter-project disabled>
            <option value="">All projects</option>
          </select>
        </label>

        <label>
          Users
          <select data-edit-filter-users multiple></select>
        </label>
      </section>

      <p data-edit-entry-status role="status" aria-live="polite"></p>

      <div class="report-table-wrap">
        <table class="report-table">
          <thead>
            <tr>
              <th scope="col">Date</th>
              <th scope="col">Client</th>
              <th scope="col">Project</th>
              <th scope="col">Duration</th>
              <th scope="col">Status</th>
              <th scope="col">Actions</th>
            </tr>
          </thead>
          <tbody data-edit-entry-table></tbody>
        </table>
      </div>

      <form class="entry-form entry-edit-form" data-edit-entry-form hidden>
        <h2 data-edit-entry-heading>Edit Entry</h2>

        <label>
          Client
          <select data-edit-entry-client required></select>
        </label>

        <label>
          Project
          <select data-edit-entry-project required></select>
        </label>

        <label>
          Date
          <input type="date" data-edit-entry-date required>
        </label>

        <label>
          Start Time
          <input type="time" data-edit-entry-start-time step="1" required>
        </label>

        <label>
          End Time
          <input type="time" data-edit-entry-end-time step="1" required>
        </label>

        <fieldset class="duration-editor">
          <legend>Duration</legend>

          <label>
            Hours
            <input type="number" min="0" step="1" inputmode="numeric" data-edit-entry-duration-hours required>
          </label>

          <label>
            Minutes
            <input type="number" min="0" max="59" step="1" inputmode="numeric" data-edit-entry-duration-minutes required>
          </label>

          <label>
            Seconds
            <input type="number" min="0" max="59" step="1" inputmode="numeric" data-edit-entry-duration-seconds required>
          </label>
        </fieldset>

        <label class="entry-description">
          Description
          <textarea data-edit-entry-description rows="4"></textarea>
        </label>

        <label>
          Billable
          <select data-edit-entry-billable>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </label>

        <label>
          Invoice Status
          <select data-edit-entry-invoice-status>
            <option value="unbilled">Unbilled</option>
            <option value="billed">Billed</option>
            <option value="paid">Paid</option>
          </select>
        </label>

        <div class="form-actions entry-actions">
          <button type="button" data-cancel-edit-entry>Cancel</button>
          <button type="submit" data-save-edit-entry>Save Changes</button>
        </div>
      </form>
    </main>

    <script src="js/navigation.js"></script>
    <script src="js/shared/modal.js"></script>
    <script src="js/shared/api-client.js"></script>
    <script src="js/shared/formatters.js"></script>
    <script src="js/shared/records.js"></script>
    <script src="js/edit-entries.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
