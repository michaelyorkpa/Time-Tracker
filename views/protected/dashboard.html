<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard | Longtail Forge</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/longtail-forge.css?v=5">
  </head>
  <body data-page-title="Dashboard">
    <main class="dashboard-page">
      <h1>Dashboard</h1>

      <section class="dashboard-summary-grid" aria-label="Dashboard summary">
        <article class="dashboard-panel active-client-panel">
          <details class="dashboard-client-details">
            <summary>
              <span>Active Clients</span>
              <span class="metric-value" data-active-client-count>0</span>
            </summary>
            <fieldset class="client-radio-list" data-client-report-options>
              <legend>Client Reporting</legend>
            </fieldset>
            <button type="button" data-open-client-report disabled>Open Reporting</button>
          </details>
        </article>
      </section>

      <section class="dashboard-panel">
        <h2>Current Month Billables</h2>
        <p data-dashboard-status role="status" aria-live="polite"></p>
        <div class="report-table-wrap">
          <table class="report-table">
            <thead>
              <tr>
                <th scope="col">Client</th>
                <th scope="col">Hours</th>
                <th scope="col">Billable Amount</th>
              </tr>
            </thead>
            <tbody data-current-month-billables></tbody>
            <tfoot>
              <tr>
                <th scope="row">Totals</th>
                <td data-current-month-hours></td>
                <td data-current-month-amount></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </section>

      <section class="dashboard-panel">
        <h2>Hours &amp; Billables by Month</h2>
        <div class="billables-chart" data-billables-chart aria-label="Previous 12 months and current month hours and billables"></div>
      </section>
    </main>

    <script src="js/navigation.js"></script>
    <script src="js/shared/formatters.js"></script>
    <script src="js/shared/billing.js"></script>
    <script src="js/shared/records.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
