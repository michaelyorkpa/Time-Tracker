<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Projects &amp; Clients | Longtail Forge</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/longtail-forge.css?v=5">
  </head>
  <body data-page-title="Projects &amp; Clients">
    <main class="wide-page">
      <div class="page-heading">
        <h1>Projects &amp; Clients</h1>
        <button type="button" data-add-client>Add Client</button>
      </div>

      <div class="client-filters">
        <label>
          Client Status
          <select data-client-status-filter>
            <option value="Active" selected>Active</option>
            <option value="Inactive">Inactive</option>
            <option value="All">All</option>
          </select>
        </label>
      </div>

      <p data-client-project-status role="status" aria-live="polite"></p>
      <section class="client-list" data-client-list aria-label="Clients and projects"></section>

      <dialog data-client-modal>
        <form method="dialog" data-client-form>
          <h2>Add Client</h2>

          <label>
            Client Name
            <input type="text" data-new-client-name required>
          </label>

          <label>
            First Project Name
            <input type="text" data-new-project-name required>
          </label>

          <label>
            First Project Billing Rate ($/hour)
            <input type="text" inputmode="decimal" data-new-project-billing-rate>
          </label>

          <label>
            First Project Status
            <select data-new-project-status>
              <option>Active</option>
              <option>Inactive</option>
              <option>Completed</option>
            </select>
          </label>

          <div class="form-actions">
            <button type="button" data-cancel-client>Cancel</button>
            <button type="submit">Save</button>
          </div>
        </form>
      </dialog>
    </main>

    <script src="js/navigation.js"></script>
    <script src="js/clients-projects.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
