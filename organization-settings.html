<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Organization Settings | Longtail Forge</title>
    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="styles/longtail-forge.css?v=5">
  </head>
  <body data-page-title="Organization Settings">
    <main class="settings-page">
      <h1>Organization Settings</h1>

      <form class="settings-form" data-organization-settings-form>
        <label>
          Organization Name
          <input type="text" data-organization-name-input required>
        </label>

        <fieldset class="settings-fieldset">
          <legend>Fiscal Year</legend>

          <label>
            Start Month
            <select data-fiscal-year-start-month></select>
          </label>

          <label>
            Start Day
            <select data-fiscal-year-start-day></select>
          </label>
        </fieldset>

        <fieldset class="settings-fieldset">
          <legend>Billing Settings</legend>

          <label>
            Default Billing Rate ($/hour)
            <input type="text" inputmode="decimal" data-default-billing-rate-input>
          </label>

          <label>
            Billing Period
            <select data-billing-period-type>
              <option value="calendarMonth">Calendar month</option>
              <option value="custom">Custom</option>
            </select>
          </label>

          <label>
            Start Day
            <select data-billing-period-start-day></select>
          </label>

          <label class="inline-option">
            <input type="checkbox" data-billing-rounding-enabled>
            Round?
          </label>

          <label>
            Rounding Increment
            <select data-billing-rounding-increment disabled>
              <option value="nearestQuarterHour">Nearest quarter hour</option>
              <option value="nearestHalfHour">Nearest half hour</option>
              <option value="nearestHour">Nearest hour</option>
            </select>
          </label>
        </fieldset>

        <button type="submit" data-save-settings>Save Settings</button>
      </form>

      <p data-organization-settings-status role="status" aria-live="polite"></p>
    </main>

    <script src="navigation.js"></script>
    <script src="organization-settings.js"></script>
    <script src="footer.js"></script>
  </body>
</html>
